repos:
  # ── Ruff: lint + format ───────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Mypy: static type checking ────────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd backend && ../.venv/bin/mypy app'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
