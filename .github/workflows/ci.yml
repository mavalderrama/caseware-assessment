name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        working-directory: backend
        run: uv sync --dev --frozen

      - name: Check formatting
        working-directory: backend
        run: uv run ruff format --check .

      - name: Check lint
        working-directory: backend
        run: uv run ruff check .

  # ── Type check ──────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        working-directory: backend
        run: uv sync --dev --frozen

      - name: Run mypy
        working-directory: backend
        run: uv run mypy app
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          MYPYPATH: "."

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: datasearch
          POSTGRES_USER: datasearch
          POSTGRES_PASSWORD: datasearch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datasearch -d datasearch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        working-directory: backend
        run: uv sync --dev --frozen

      - name: Run migrations
        working-directory: backend
        run: uv run python manage.py migrate --no-input
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: datasearch
          DB_USER: datasearch
          DB_PASSWORD: datasearch

      - name: Run tests
        working-directory: backend
        run: uv run pytest
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: datasearch
          DB_USER: datasearch
          DB_PASSWORD: datasearch

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: datasearchpy:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
